<script type="text/javascript">
        var gk_isXlsx = false;
        var gk_xlsxFileLookup = {};
        var gk_fileData = {};
        function filledCell(cell) {
          return cell !== '' && cell != null;
        }
        function loadFileData(filename) {
        if (gk_isXlsx && gk_xlsxFileLookup[filename]) {
            try {
                var workbook = XLSX.read(gk_fileData[filename], { type: 'base64' });
                var firstSheetName = workbook.SheetNames[0];
                var worksheet = workbook.Sheets[firstSheetName];

                // Convert sheet to JSON to filter blank rows
                var jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, blankrows: false, defval: '' });
                // Filter out blank rows (rows where all cells are empty, null, or undefined)
                var filteredData = jsonData.filter(row => row.some(filledCell));

                // Heuristic to find the header row by ignoring rows with fewer filled cells than the next row
                var headerRowIndex = filteredData.findIndex((row, index) =>
                  row.filter(filledCell).length >= filteredData[index + 1]?.filter(filledCell).length
                );
                // Fallback
                if (headerRowIndex === -1 || headerRowIndex > 25) {
                  headerRowIndex = 0;
                }

                // Convert filtered JSON back to CSV
                var csv = XLSX.utils.aoa_to_sheet(filteredData.slice(headerRowIndex)); // Create a new sheet from filtered array of arrays
                csv = XLSX.utils.sheet_to_csv(csv, { header: 1 });
                return csv;
            } catch (e) {
                console.error(e);
                return "";
            }
        }
        return gk_fileData[filename] || "";
        }

            function shuffle(array) {
                let currentIndex = array.length, randomIndex;
                // While there remain elements to shuffle.
                while (currentIndex != 0) {
                    // Pick a remaining element.
                    randomIndex = Math.floor(Math.random() * currentIndex);
                    currentIndex--;
                    // And swap it with the current element.
                    [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];

            // ── Drag & Drop state ──────────────────────────────────────────
            let dragSrc = null;   // { golfer, groupIndex, itemEl }

            function swapPlayers(aEl, bEl) {
                if (aEl === bEl) return;
                // Physically swap nodes in the DOM so all event listeners stay intact
                const aParent = aEl.parentNode;
                const bParent = bEl.parentNode;
                const aNext = aEl.nextSibling;
                const bNext = bEl.nextSibling;

                // Insert each in the other's old position
                if (aNext === bEl) {
                    aParent.insertBefore(bEl, aEl);
                } else if (bNext === aEl) {
                    bParent.insertBefore(aEl, bEl);
                } else {

                const el = document.elementFromPoint(touch.clientX, touch.clientY);
                const targetItem = el ? el.closest('.player-item') : null;
                const targetCard = el ? el.closest('.group-card') : null;

                clearAllDragState();

                if (targetItem && targetItem !== savedSrc) {
                    swapPlayers(savedSrc, targetItem);
                } else if (targetCard && !targetItem) {
                    moveToGroup(savedSrc, targetCard);
                }
            }

            // Global safety net: if touch is cancelled (e.g. phone call, notification), clean up
            document.addEventListener('touchcancel', clearAllDragState);

            function createGhost(text, touch) {
                ghost = document.createElement('div');
                ghost.className = 'drag-ghost';
                ghost.textContent = text;
                document.body.appendChild(ghost);
                moveGhost(touch);
            }
            function moveGhost(touch) {
                if (!ghost) return;
                ghost.style.left = touch.clientX + 'px';
                ghost.style.top  = touch.clientY - 30 + 'px';
            }
            function removeGhost() {
                if (ghost) { ghost.remove(); ghost = null; }
            }

            // ── Group card builder ─────────────────────────────────────────
            function buildGroupCard(group, groupIndex, extraClass = '') {
                group.sort((a, b) => a.localeCompare(b));

                const card = document.createElement('div');
                card.className = `group-card bg-indigo-50 p-6 rounded-lg golf-card group-card-fade-in ${extraClass}`;
                card.dataset.groupIndex = groupIndex;

                const title = document.createElement('h3');
                title.className = 'group-title text-xl font-bold text-indigo-700 mb-4 border-b-2 border-indigo-200 pb-2';
                title.textContent = `Group ${groupIndex + 1} (${group.length} players)`;
                card.appendChild(title);

                const ul = document.createElement('ul');
                ul.className = 'space-y-1';

                // Allow dropping onto empty space in card
                ul.addEventListener('dragover', e => e.preventDefault());
                ul.addEventListener('drop', e => {
                    e.preventDefault();
                    if (dragSrc) moveToGroup(dragSrc, card);
                });

                group.forEach(golfer => ul.appendChild(createPlayerItem(golfer, groupIndex)));
                card.appendChild(ul);
                return card;
            }

            // Function to render the groups with an optimized distribution of 3 and 4 players
            function renderGroups(golfers) {
                groupsContainer.innerHTML = '';
                
                const numGolfers = golfers.length;
                if (numGolfers === 0) {
                    groupsContainer.innerHTML = '<p class="text-center text-gray-500 col-span-full">No golfers selected. Please check the boxes next to the players you want to include.</p>';
                    return;
                }
                if (numGolfers < 3) {
                    groupsContainer.innerHTML = `<p class="text-center text-gray-500 col-span-full">Please select at least 3 golfers to create groups. Only ${numGolfers} selected.</p>`;
                    return;
                }
                
                let groupsOf4 = 0, groupsOf3 = 0, groupsOf2 = 0;
                let remainder = numGolfers % 4;

                if (remainder === 0) {
                    groupsOf4 = numGolfers / 4;
                } else if (remainder === 1) {
                    if (numGolfers === 5) { groupsOf3 = 1; groupsOf2 = 1; }
                    else if (numGolfers >= 9) { groupsOf3 = 3; groupsOf4 = (numGolfers - 9) / 4; }
                    else if (numGolfers < 5) { renderSingleGroup(golfers); return; }
                } else if (remainder === 2) {
                    if (numGolfers < 6) { renderSingleGroup(golfers); return; }
                    groupsOf3 = 2; groupsOf4 = (numGolfers - 6) / 4;
                } else if (remainder === 3) {
                    groupsOf3 = 1; groupsOf4 = (numGolfers - 3) / 4;
                }

                let allGroups = [];
                let idx = 0;
                for (let i = 0; i < groupsOf3; i++) { allGroups.push(golfers.slice(idx, idx + 3)); idx += 3; }
                for (let i = 0; i < groupsOf4; i++) { allGroups.push(golfers.slice(idx, idx + 4)); idx += 4; }
                for (let i = 0; i < groupsOf2; i++) { allGroups.push(golfers.slice(idx, idx + 2)); idx += 2; }

                allGroups.forEach((group, i) => groupsContainer.appendChild(buildGroupCard(group, i)));

                lastDrawnGroups = allGroups;
                localStorage.setItem(drawnGroupsKey, JSON.stringify(allGroups));
                shareWhatsAppButton.classList.remove('hidden');
            }
            
            function renderSingleGroup(golfers) {
                groupsContainer.innerHTML = '';
                groupsContainer.appendChild(buildGroupCard(golfers, 0, 'col-span-full'));
                lastDrawnGroups = [golfers];
                localStorage.setItem(drawnGroupsKey, JSON.stringify([golfers]));
                shareWhatsAppButton.classList.remove('hidden');
            }

            // Event listener for the "Add Golfer" button
            addGolferButton.addEventListener('click', () => {
                const newGolferName = newGolferInput.value.trim();
                if (newGolferName && !golferNames.includes(newGolferName)) {
                    golferNames.push(newGolferName);
                    // Sort the list after adding a new golfer to keep the checkbox order consistent.
                    golferNames.sort((a, b) => a.localeCompare(b));
                    saveGolfersToLocalStorage();
                    populateGolferChecklist();
                    newGolferInput.value = '';
                } else if (golferNames.includes(newGolferName)) {
                    newGolferInput.placeholder = 'Golfer already exists!';
                    setTimeout(() => {
                        newGolferInput.placeholder = 'Enter new golfer name';
                    }, 2000);
                }
            });

            // Event listener for "Deselect All" button
            deselectAllButton.addEventListener('click', () => {
                golferChecklist.querySelectorAll('input[type=checkbox]:checked').forEach(cb => cb.checked = false);
                updateTally();
            });

            // Event listener for "Clear Draw" button
            clearDrawButton.addEventListener('click', () => {
                lastDrawnGroups = [];
                lastSelectedGolfers = [];
                localStorage.removeItem(drawnGroupsKey);
                groupsContainer.innerHTML = '<p class="text-center text-gray-500 col-span-full">No golfers selected. Please check the boxes next to the players you want to include.</p>';
                reshuffleButton.classList.add('hidden');
                clearDrawButton.classList.add('hidden');
                shareWhatsAppButton.classList.add('hidden');
            });

            // Event listener for the "Draw Groups" button
            drawGroupsButton.addEventListener('click', () => {
                const selectedGolfers = Array.from(golferChecklist.querySelectorAll('input:checked')).map(checkbox => checkbox.value);
                
                if (selectedGolfers.length === 0) {
                    renderGroups([]);
                    return;
                }
                
                // Show loading message and clear groups
                loadingMessage.classList.remove('hidden');
                groupsContainer.innerHTML = '';
                
                setTimeout(() => {
                    loadingMessage.classList.add('hidden');
                    // Store the selected golfers for reshuffle
                    lastSelectedGolfers = [...selectedGolfers];
                    
                    // Create a copy and shuffle
                    const golfersToShuffle = [...lastSelectedGolfers];
                    const shuffledGolfers = shuffle(golfersToShuffle);
                    
                    // Render the new groups
                    renderGroups(shuffledGolfers);
                    
                    // Show the reshuffle button
                    reshuffleButton.classList.remove('hidden');
                    clearDrawButton.classList.remove('hidden');
                }, 500); // A short delay to make the drawing process visible
            });

            // Event listener for the "Reshuffle Groups" button
            reshuffleButton.addEventListener('click', () => {
                if (lastSelectedGolfers.length === 0) {
                    return;
                }
                
                // Show loading message and clear groups
                loadingMessage.classList.remove('hidden');
                groupsContainer.innerHTML = '';
                
                setTimeout(() => {
                    loadingMessage.classList.add('hidden');
                    // Create a copy of the last selected golfers and shuffle
                    const golfersToShuffle = [...lastSelectedGolfers];
                    const shuffledGolfers = shuffle(golfersToShuffle);
                    
                    // Render the new groups
                    renderGroups(shuffledGolfers);
                }, 500); // A short delay to make the drawing process visible
            });
            
            // Event listener for the "Edit Title" button
            editTitleButton.addEventListener('click', () => {
                const newTitle = prompt("Enter a new title:", mainTitle.textContent);
                if (newTitle !== null && newTitle.trim() !== "") {
                    saveTitleToLocalStorage(newTitle);
                }
            });

            // Event listener for "Share to WhatsApp" button — captures groups as an image
            shareWhatsAppButton.addEventListener('click', async () => {
                if (lastDrawnGroups.length === 0) return;

                // Build a self-contained off-screen snapshot element
                const snapshot = document.createElement('div');
                snapshot.style.cssText = [
                    'position:fixed', 'left:-9999px', 'top:0',
                    'background:#f3f4f6', 'padding:24px', 'border-radius:16px',
                    'font-family:Inter,sans-serif', 'width:600px'
                ].join(';');

                // Title banner
                const banner = document.createElement('div');
                banner.style.cssText = 'text-align:center;margin-bottom:20px;';
                banner.innerHTML = `
                    <div style="font-size:28px;font-weight:800;color:#1e293b;letter-spacing:-0.5px;">
                        ⛳ ${mainTitle.textContent} ⛳
                    </div>`;
                snapshot.appendChild(banner);

                // Groups grid
                const grid = document.createElement('div');
                grid.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;';

                lastDrawnGroups.forEach((group, i) => {
                    const card = document.createElement('div');
                    card.style.cssText = [
                        'background:#fff', 'border-radius:12px',
                        'padding:16px', 'box-shadow:0 2px 8px rgba(0,0,0,0.10)'
                    ].join(';');

                    const heading = document.createElement('div');
                    heading.style.cssText = [
                        'font-size:16px', 'font-weight:700', 'color:#4338ca',
                        'border-bottom:2px solid #c7d2fe', 'padding-bottom:8px', 'margin-bottom:10px'
                    ].join(';');
                    heading.textContent = `Group ${i + 1}  (${group.length} players)`;
                    card.appendChild(heading);

                    const sorted = [...group].sort((a, b) => a.localeCompare(b));
                    sorted.forEach(golfer => {
                        const row = document.createElement('div');
                        row.style.cssText = 'display:flex;align-items:flex-start;gap:8px;padding:4px 0;';

                        const dot = document.createElement('span');
                        dot.style.cssText = 'display:inline-block;width:8px;height:8px;border-radius:50%;background:#6366f1;flex-shrink:0;margin-top:3px;align-self:flex-start;';
                        row.appendChild(dot);

                        const name = document.createElement('span');
                        name.style.cssText = 'font-size:14px;font-weight:500;color:#374151;line-height:1.4;';
                        name.textContent = golfer;
                        row.appendChild(name);

                        if (phcData[golfer] !== undefined) {
                            const badge = document.createElement('span');
                            badge.style.cssText = 'margin-left:auto;font-size:12px;font-weight:500;color:#6b7280;';
                            badge.textContent = `PHC ${phcData[golfer]}`;
                            row.appendChild(badge);
                        }
                        card.appendChild(row);
                    });
                    grid.appendChild(card);
                });

                // If odd number of groups, span last card full width
                if (lastDrawnGroups.length % 2 !== 0 && lastDrawnGroups.length > 1) {
                    grid.lastChild.style.gridColumn = '1 / -1';
                }

                snapshot.appendChild(grid);
                document.body.appendChild(snapshot);

                // Temporarily show the original button label as "Generating…"
                const origLabel = shareWhatsAppButton.querySelector('span');
                const origText = origLabel.textContent;
                origLabel.textContent = 'Generating image…';
                shareWhatsAppButton.disabled = true;

                try {
                    const canvas = await html2canvas(snapshot, {
                        scale: 2,
                        useCORS: true,
                        backgroundColor: '#f3f4f6'
                    });

                    canvas.toBlob(blob => {
                        if (!blob) {
                            alert('Could not generate image. Try the text share option instead.');
                            return;
                        }
                        const file = new File([blob], 'golf-groups.png', { type: 'image/png' });

                        if (navigator.canShare && navigator.canShare({ files: [file] })) {
                            // Native share (mobile — will open WhatsApp, Messages, etc.)
                            navigator.share({
                                files: [file],
                                title: mainTitle.textContent,
                                text: '🏌️ Golf Groups Draw'
                            }).catch(() => {});
                        } else {
                            // Fallback: download the image so the user can share manually
                            const url = URL.createObjectURL(blob);
                            const a = document.createElement('a');
                            a.href = url;
                            a.download = 'golf-groups.png';
                            a.click();
                            URL.revokeObjectURL(url);
                            alert('Image downloaded! Open WhatsApp and attach the image to share it.');
                        }
                    }, 'image/png');
                } finally {
                    document.body.removeChild(snapshot);
                    origLabel.textContent = origText;
                    shareWhatsAppButton.disabled = false;
                }
            });

            // Initial setup on page load
            populateGolferChecklist();
            if (lastDrawnGroups.length > 0) {
                lastDrawnGroups.forEach((group, i) => {
                    groupsContainer.appendChild(buildGroupCard(group, i, i === 0 && lastDrawnGroups.length === 1 ? 'col-span-full' : ''));
                });
                reshuffleButton.classList.remove('hidden');
                clearDrawButton.classList.remove('hidden');
                shareWhatsAppButton.classList.remove('hidden');
            } else {
                renderGroups([]);
            }
        };
    </script>

</body>
